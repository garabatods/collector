<body class="bg-surface text-on-surface font-body selection:bg-primary/30 selection:text-primary min-h-screen flex flex-col overflow-hidden">
<!-- Hero Backdrop with Subtle Glow -->
<div class="fixed inset-0 bg-mesh pointer-events-none z-0"></div>
<!-- Main Splash Content -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-center p-8">
<!-- Brand Identity Cluster -->
<div class="flex flex-col items-center space-y-4">
<!-- Asymmetrical Decorative Accent (Design System "Editorial" Rule) -->
<div class="w-12 h-[2px] bg-primary/40 -ml-16 mb-2"></div>
<div class="relative group">
<!-- Atmospheric Glow Behind Logo -->
<div class="absolute -inset-10 bg-primary/10 blur-[64px] rounded-full"></div>
<!-- Main Branding -->
<h1 class="font-headline font-black text-4xl md:text-6xl tracking-tighter text-on-surface uppercase relative">
                    Collector
                    <span class="absolute -right-2 -top-1 block w-2 h-2 rounded-full bg-secondary shadow-[0_0_12px_rgba(255,113,106,0.6)]"></span>
</h1>
</div>
<div class="flex items-center space-x-3 pt-2">
<span class="font-label text-[10px] tracking-[0.2em] uppercase text-outline">Museum-Grade Archive</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span class="font-label text-[10px] tracking-[0.2em] uppercase text-outline">Digital Curator v2.0</span>
</div>
</div>
</main>
<!-- Footer Loading State -->
<footer class="relative z-10 p-12 flex flex-col items-center space-y-8">
<!-- Minimalist Loading Indicator -->
<div class="w-48 h-[1px] bg-surface-container-highest relative overflow-hidden">
<div class="absolute inset-y-0 left-0 w-1/3 bg-gradient-to-r from-transparent via-primary to-transparent"></div>
</div>
<!-- System Status Labels -->
<div class="flex flex-col items-center space-y-1">
<p class="font-label text-[9px] uppercase tracking-[0.3em] text-on-surface-variant">Synchronizing Vault</p>
<p class="font-label text-[8px] uppercase tracking-[0.1em] text-outline">Initializing secure exhibition environment...</p>
</div>
</footer>
<!-- Artistic Overlay Texture -->
<div class="fixed inset-0 opacity-[0.03] pointer-events-none z-50">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
</div>
